name: Build FBNeo Plus for iOS
on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Core
        run: |
          # 1. 自动寻找 Makefile.libretro 所在的目录并进入
          MAKEFILE_PATH=$(find . -name "Makefile.libretro" | head -n 1)
          MAKEFILE_DIR=$(dirname "$MAKEFILE_PATH")
          echo "Found Makefile in: $MAKEFILE_DIR"
          cd "$MAKEFILE_DIR"
          
          # 2. 执行编译
          make -f Makefile.libretro platform=ios-arm64 -j$(sysctl -n hw.ncpu)
          
          # 3. 寻找生成的 dylib 文件并移出到根目录重命名
          # 无论它生成在哪个深度，都给它揪出来
          find ../../../ -name "*.dylib" -exec mv {} ../../../fbneo_plus \; || find ./ -name "*.dylib" -exec mv {} ../../../fbneo_plus \;
          
      - name: Create Info File
        run: |
          cat <<EOF > fbneo_plus.info
          display_name = "Arcade (FBNeo Plus - Hack Edition)"
          authors = "Team FBNeo & lrf739146825"
          supported_extensions = "zip|7z|dat|neogeo"
          corename = "FBNeo Plus"
          manufacturer = "Various"
          categories = "Emulator"
          systemname = "Arcade (various)"
          database = "FBNeo - Arcade Games"
          license = "Non-commercial"
          permissions = ""
          display_version = "v1.0.0.3"
          supports_no_game = "false"
          EOF

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FBNeo_Plus_iOS
          path: |
            fbneo_plus
            fbneo_plus.info
