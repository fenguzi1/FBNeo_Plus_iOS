name: Build FBNeo Plus for iOS
on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Core
        run: |
          # 1. 强制进入 libretro 源码目录
          # 如果路径不存在，ls 会报错帮助我们定位
          ls -R src/burner/libretro || echo "Directory not found!"
          cd src/burner/libretro
          
          # 2. 执行编译 (iOS arm64)
          make -f Makefile.libretro platform=ios-arm64 -j$(sysctl -n hw.ncpu)
          
          # 3. 寻找生成的 dylib 并移动到根目录
          # 编译出来的文件名通常是 fbneo_libretro_ios.dylib
          mv *.dylib ../../../fbneo_plus
          
      - name: Create Info File
        run: |
          cat <<EOF > fbneo_plus.info
          display_name = "Arcade (FBNeo Plus - Hack Edition)"
          authors = "Team FBNeo & lrf739146825"
          supported_extensions = "zip|7z|dat|neogeo"
          corename = "FBNeo Plus"
          manufacturer = "Various"
          categories = "Emulator"
          systemname = "Arcade (various)"
          database = "FBNeo - Arcade Games"
          license = "Non-commercial"
          permissions = ""
          display_version = "v1.0.0.3"
          supports_no_game = "false"
          EOF

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FBNeo_Plus_iOS
          path: |
            fbneo_plus
            fbneo_plus.info
