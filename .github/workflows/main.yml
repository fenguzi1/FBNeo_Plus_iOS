name: Build FBNeo Plus for iOS
on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Core
        run: |
          TARGET_FILE="src/burner/libretro/libretro.cpp"
          if [ -f "$TARGET_FILE" ]; then
            sed -i '' 's/sprintf(library_version, "v%x.%x.%x.%02x %s %s".*/sprintf(library_version, "v1.1.2 %s", GIT_VERSION);/' "$TARGET_FILE"
            sed -i '' 's/info->library_name *= *APP_TITLE;/info->library_name = "FBNeo Plus";/' "$TARGET_FILE"
          fi

          if [ -d "src/burner/libretro" ]; then
            cd src/burner/libretro
          elif [ -d "src/libretro" ]; then
            cd src/libretro
          fi
          
          if [ -f "Makefile.libretro" ]; then
             make -f Makefile.libretro platform=ios-arm64 -j$(sysctl -n hw.ncpu)
          else
             make platform=ios-arm64 -j$(sysctl -n hw.ncpu)
          fi
          
          find . -name "*.dylib" -exec cp {} ${{ github.workspace }}/fbneo.plus.libretro \;
          
      - name: Create Info File
        run: |
          cat <<EOF > fbneo.plus.libretro.info
          display_name = "Arcade (FBNeo Plus)"
          authors = "Team FBNeo, lrf739146825 & fenguzi"
          supported_extensions = "zip|7z|cue|ccd|dat|neogeo"
          corename = "fbneo.plus.libretro"
          license = "Non-commercial"
          permissions = ""
          display_version = "v1.1.2"
          categories = "Emulator"
          manufacturer = "Various"
          systemname = "Arcade (various)"
          systemid = "fb_alpha"
          savestate = "true"
          savestate_features = "deterministic"
          cheats = "true"
          input_descriptors = "true"
          memory_descriptors = "true"
          libretro_saves = "false"
          core_options = "true"
          core_options_version = "2.0"
          load_subsystem = "true"
          supports_no_game = "false"
          hw_render = "false"
          needs_fullpath = "true"
          disk_control = "false"
          database_match_archive_member = "false"
          database = "FBNeo - Arcade Games"
          firmware_count = 23
          firmware0_desc = "fbneo/neogeo.zip (Neo Geo BIOS)"
          firmware0_path = "fbneo/neogeo.zip"
          firmware0_opt = "true"
          firmware1_desc = "fbneo/neocdz.zip (Neo Geo CDZ System BIOS)"
          firmware1_path = "fbneo/neocdz.zip"
          firmware1_opt = "true"
          firmware2_desc = "fbneo/decocass.zip (DECO Cassette System BIOS)"
          firmware2_path = "fbneo/decocass.zip"
          firmware2_opt = "true"
          firmware3_desc = "fbneo/isgsm.zip (ISG Selection Master Type 2006 System BIOS)"
          firmware3_path = "fbneo/isgsm.zip"
          firmware3_opt = "true"
          firmware4_desc = "fbneo/midssio.zip (Midway SSIO Sound Board Internal ROM)"
          firmware4_path = "fbneo/midssio.zip"
          firmware4_opt = "true"
          firmware5_desc = "fbneo/nmk004.zip (NMK004 Internal ROM)"
          firmware5_path = "fbneo/nmk004.zip"
          firmware5_opt = "true"
          firmware6_desc = "fbneo/pgm.zip (PGM System BIOS)"
          firmware6_path = "fbneo/pgm.zip"
          firmware6_opt = "true"
          firmware7_desc = "fbneo/skns.zip (Super Kaneko Nova System BIOS)"
          firmware7_path = "fbneo/skns.zip"
