          firmware10_desc = "fbneo/bubsys.zip (Bubble System BIOS)"
          firmware10_path = "fbneo/bubsys.zip"
          firmware10_opt = "true"
          firmware11_desc = "fbneo/namcoc69.zip (Namco C69 BIOS)"
