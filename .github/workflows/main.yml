name: Build FBNeo Plus for iOS
on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Core
        run: |
          # 1. 自动化修改源码 (修正左下角显示与名称)
          TARGET_FILE="src/burner/libretro/libretro.cpp"
          if [ -f "$TARGET_FILE" ]; then
            echo "Modifying source code for custom branding..."
            # 暴力替换版本号计算行为 v1.1.2 并保留 GIT 散列
            sed -i '' 's/sprintf(library_version, "v%x.%x.%x.%02x %s %s".*/sprintf(library_version, "v1.1.2 GIT%s", GIT_VERSION);/' "$TARGET_FILE"
            # 将显示名称从原版 APP_TITLE 替换为 "FBNeo Plus"
            sed -i '' 's/info->library_name *= *APP_TITLE;/info->library_name = "FBNeo Plus";/' "$TARGET_FILE"
          fi

          # 2. 进入目录并编译
          if [ -d "src/burner/libretro" ]; then
            cd src/burner/libretro
          elif [ -d "src/libretro" ]; then
            cd src/libretro
          fi
          
          echo "Starting compilation for iOS ARM64..."
          if [ -f "Makefile.libretro" ]; then
             make -f Makefile.libretro platform=ios-arm64 -j$(sysctl -n hw.ncpu)
          else
             make platform=ios-arm64 -j$(sysctl -n hw.ncpu)
          fi
          
          # 3. 提取并规范命名 (参考 fceumm.libretro 格式)
          find . -name "*.dylib" -exec cp {} ${{ github.workspace }}/fbneo_plus.libretro \;
          
      - name: Create Info File
        run: |
          # 生成匹配核心的 info 文件
          cat <<EOF > fbneo_plus.libretro.info
          display_name = "Arcade (FBNeo Plus)"
          authors = "Team FBNeo, lrf739146825 & fenguzi"
          supported_extensions = "zip|7z|cue|ccd|dat|neogeo"
          corename = "fbneo_plus"
          license = "Non-commercial"
          display_version = "v1.1.2"
          categories = "Emulator"
          systemname = "Arcade (various)"
          database = "FBNeo - Arcade Games"
          notes = "iOS optimized build by fenguzi. Supporting specialized hacks."
          EOF

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FBNeo_Plus_iOS_fenguzi_Build
          path: |
            fbneo_plus.libretro
            fbneo_plus.libretro.info
