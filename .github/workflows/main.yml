          firmware22_path = "fbneo/hiscore.dat"
          firmware22_opt = "true"
          notes = "(!) Optimized iOS build by fenguzi. Supporting specialized hacks.|(!) The BIOS files can also be inside the ROM directory or the root of SYSTEM directory."
          description = "FinalBurn Neo Plus - Custom iOS build by fenguzi. Compatible with specialized ROM hacks."
          EOF

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FBNeo_Plus_iOS_fenguzi_Final
          path: |
            fbneo.plus.libretro
            fbneo.plus.libretro.info
